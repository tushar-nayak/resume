name: Build and Push Resume PDF and Preview

on:
  push:
    branches:
      - main  # Change this to 'master' if your default branch is named master

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex 

      - name: Install PDF conversion tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Rename, Create Preview, Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. Rename the compiled main.pdf
          mv main.pdf tushar-nayak-resume.pdf
          
          # 2. Convert the first page of the PDF to a PNG image
          # -png specifies the format, -r 150 sets the resolution, -singlefile outputs just the first page
          pdftoppm -png -r 150 -singlefile tushar-nayak-resume.pdf preview
          
          # 3. Add both the PDF and the new image to Git
          git add tushar-nayak-resume.pdf preview.png
          
          # 4. Commit and push
          git commit -m "Auto-compiled PDF and generated preview" || echo "No changes to commit"
          git push
