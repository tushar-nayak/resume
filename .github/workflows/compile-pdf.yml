name: Build and Push Resume PDF

on:
  push:
    branches:
      - main  # Change this to 'master' if your default branch is named master

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex 

      - name: Rename, Commit and push PDF
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Rename the compiled main.pdf to your desired filename
          mv main.pdf tushar-nayak-resume.pdf
          
          # Add the specifically named PDF
          git add tushar-nayak-resume.pdf
          
          git commit -m "Auto-compiled PDF from GitHub Actions" || echo "No changes to commit"
          git push
