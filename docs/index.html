<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f1ea" />
    <meta
      name="description"
      content="Tushar Nayak resume PDF viewer."
    />
    <title>Tushar Nayak | Resume PDF</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="bar">
      <div>
        <h1>Tushar Nayak</h1>
        <p>Resume PDF viewer</p>
      </div>
      <a class="button" href="../tushar-nayak-resume.pdf" download>Download PDF</a>
    </header>

    <main class="viewer-wrap">
      <object class="viewer" data="../tushar-nayak-resume.pdf" type="application/pdf">
        <p>
          Your browser cannot display PDFs inline.
          <a href="../tushar-nayak-resume.pdf">Open the PDF</a>.
        </p>
      </object>
    </main>

    <section class="repo-strip" aria-label="Project repositories">
      <h2>Project repositories</h2>
      <div class="repo-links">
        <a href="https://github.com/tushar-nayak/cardiac-volume-reconstruction" target="_blank" rel="noreferrer">cardiac-volume-reconstruction</a>
        <a href="https://github.com/tushar-nayak/neural-anisotropic-diffusion" target="_blank" rel="noreferrer">neural-anisotropic-diffusion</a>
        <a href="https://github.com/tushar-nayak/grading-cbisddsm" target="_blank" rel="noreferrer">grading-cbisddsm</a>
        <span>fluoro-grid (private repo)</span>
      </div>
    </section>
  </body>
</html>
